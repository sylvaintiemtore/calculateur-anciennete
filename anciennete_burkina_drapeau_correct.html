
<h2 class="sr-only">Calculateur d'ancienneté pour la Fonction Publique du Burkina Faso</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.header{display:grid;grid-template-rows:1fr 1fr;border-radius:var(--border-radius-lg) var(--border-radius-lg) 0 0;overflow:hidden;height:72px}
.header-red{background:#EF2B2D;display:flex;align-items:center;padding:0 20px;justify-content:space-between;position:relative}
.header-green{background:#009A44;display:flex;align-items:center;padding:0 20px}
.header-title{color:#fff;font-size:16px;font-weight:500;font-family:var(--font-sans)}
.header-sub{color:#CCFFCC;font-size:11px;font-family:var(--font-sans)}
.star-wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:2}
.form-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-top:none;border-radius:0 0 var(--border-radius-lg) var(--border-radius-lg);padding:18px 20px 14px;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px}
.field label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px;font-family:var(--font-sans)}
.date-row{display:flex;align-items:center;gap:4px}
.date-row input{width:44px;text-align:center;padding:6px 4px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.date-row input.year{width:62px}
.date-row span{color:var(--color-text-tertiary);font-size:14px}
.field input[type=text]{width:100%;padding:7px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.field select{width:90px;padding:7px 8px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.btn-row{display:flex;gap:10px;margin-top:14px;justify-content:center}
.btn-calc{background:#009A44;color:#fff;border:none;padding:9px 22px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans)}
.btn-calc:hover{background:#007a35}
.btn-clear{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);padding:9px 18px;border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;font-family:var(--font-sans)}
.results{display:none}
.banner{background:#009A44;padding:12px 18px;border-radius:var(--border-radius-md);color:#fff;font-size:13px;font-weight:500;margin-bottom:14px;font-family:var(--font-sans)}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;text-align:center}
.metric-card .mc-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;line-height:1.3;font-family:var(--font-sans)}
.metric-card .mc-val{font-size:22px;font-weight:500;line-height:1.1;font-family:var(--font-sans)}
.metric-card .mc-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px;font-family:var(--font-sans)}
.section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:14px}
.section-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary);font-family:var(--font-sans)}
.palier-header{display:grid;grid-template-columns:60px 1fr 120px 90px 110px;background:#EF2B2D;padding:7px 14px}
.palier-header span{font-size:11px;font-weight:500;color:#fff;text-align:center;font-family:var(--font-sans)}
.palier-header span:nth-child(2){text-align:left}
.palier-row{display:grid;grid-template-columns:60px 1fr 120px 90px 110px;padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary);align-items:center}
.palier-row:last-child{border-bottom:none}
.palier-row span{font-size:12px;color:var(--color-text-primary);text-align:center;font-family:var(--font-sans)}
.palier-row span:nth-child(2){text-align:left;font-weight:500}
.palier-row.past{background:var(--color-background-success)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;font-family:var(--font-sans)}
.retraite-inner{padding:14px}
.ret-banner{border-radius:var(--border-radius-md);padding:14px 16px}
.ret-banner h3{font-size:14px;font-weight:500;color:#fff;margin-bottom:4px;font-family:var(--font-sans)}
.ret-banner p{font-size:12px;margin-bottom:2px;font-family:var(--font-sans)}
.err{background:var(--color-background-danger);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none;font-family:var(--font-sans)}
</style>

<div style="padding:0 0 16px">

  <!-- DRAPEAU : rouge haut / vert bas / étoile jaune centrée à cheval -->
  <div class="header" style="position:relative">
    <div class="header-red">
      <span class="header-title">Calculateur d'ancienneté</span>
      <span style="color:#FFCCCC;font-size:11px">Fonction Publique du Burkina Faso</span>
    </div>
    <div class="header-green"></div>
    <!-- étoile jaune centrée, à cheval sur la frontière rouge/vert -->
    <svg class="star-wrap" width="40" height="40" viewBox="-20 -20 40 40" xmlns="http://www.w3.org/2000/svg">
      <!-- étoile à 5 branches, pointe du haut vers le haut, rotation 0° = pointe nord -->
      <polygon points="0,-17 4.04,-5.56 16.17,-5.26 6.94,2.12 10.31,14.45 0,7.6 -10.31,14.45 -6.94,2.12 -16.17,-5.26 -4.04,-5.56" fill="#FCD116"/>
    </svg>
  </div>

  <div class="form-section">
    <div class="form-grid">
      <div class="field">
        <label>Nom complet (optionnel)</label>
        <input type="text" id="nom" placeholder="Nom de l'agent">
      </div>
      <div class="field">
        <label>Date de naissance</label>
        <div class="date-row">
          <input id="dob_j" maxlength="2" placeholder="JJ">
          <span>/</span>
          <input id="dob_m" maxlength="2" placeholder="MM">
          <span>/</span>
          <input id="dob_a" maxlength="4" class="year" placeholder="AAAA">
        </div>
      </div>
      <div class="field">
        <label>Date d'intégration</label>
        <div class="date-row">
          <input id="doi_j" maxlength="2" placeholder="JJ">
          <span>/</span>
          <input id="doi_m" maxlength="2" placeholder="MM">
          <span>/</span>
          <input id="doi_a" maxlength="4" class="year" placeholder="AAAA">
        </div>
      </div>
      <div class="field">
        <label>Âge légal de retraite</label>
        <select id="ret_age">
          <option value="55">55 ans</option>
          <option value="58">58 ans</option>
          <option value="60" selected>60 ans</option>
          <option value="63">63 ans</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-calc" onclick="calculer()">Calculer l'ancienneté</button>
      <button class="btn-clear" onclick="effacer()">Effacer</button>
    </div>
  </div>

  <div class="err" id="err"></div>
  <div class="results" id="results">
    <div class="banner" id="banner"></div>
    <div class="metrics-grid" id="metrics"></div>
    <div class="section">
      <div class="section-title">Paliers d'âge réglementaires</div>
      <div class="palier-header">
        <span>Palier</span><span>Label</span><span>Date atteinte</span><span>Ancienneté</span><span>Statut</span>
      </div>
      <div id="paliers"></div>
    </div>
    <div class="section">
      <div class="section-title">Départ à la retraite</div>
      <div class="retraite-inner" id="retraite"></div>
    </div>
  </div>
</div>

<script>
const MOIS=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
function fmtDate(d){return`${String(d.getDate()).padStart(2,'0')} ${MOIS[d.getMonth()]} ${d.getFullYear()}`}
function addYears(d,n){const r=new Date(d);r.setFullYear(r.getFullYear()+n);return r}
function diffYMD(from,to){
  let y=to.getFullYear()-from.getFullYear();
  let mo=to.getMonth()-from.getMonth();
  let dy=to.getDate()-from.getDate();
  if(dy<0){mo--;const prev=new Date(to.getFullYear(),to.getMonth(),0);dy+=prev.getDate()}
  if(mo<0){y--;mo+=12}
  return[y,mo,dy]
}
function fmtRel(target,today){
  if(target<=today)return"Atteint";
  const[y,mo,d]=diffYMD(today,target);
  const p=[];
  if(y)p.push(`${y} an${y>1?'s':''}`);
  if(mo)p.push(`${mo} mois`);
  if(d&&y===0)p.push(`${d} j`);
  return"Dans "+(p.join(", ")||"0 j")
}
function err(msg){const e=document.getElementById('err');e.textContent=msg;e.style.display='block';document.getElementById('results').style.display='none'}
function calculer(){
  document.getElementById('err').style.display='none';
  const today=new Date();today.setHours(0,0,0,0);
  function getDate(pref,label){
    const j=parseInt(document.getElementById(pref+'_j').value);
    const m=parseInt(document.getElementById(pref+'_m').value);
    const a=parseInt(document.getElementById(pref+'_a').value);
    if(isNaN(j)||isNaN(m)||isNaN(a)||j<1||j>31||m<1||m>12||a<1900)throw new Error(`Date invalide : ${label}`);
    const d=new Date(a,m-1,j);
    if(d.getDate()!==j)throw new Error(`Date invalide : ${label}`);
    return d;
  }
  let dob,doi;
  try{dob=getDate('dob','Date de naissance');doi=getDate('doi',"Date d'intégration")}
  catch(e){err(e.message);return}
  if(dob>=today){err("La date de naissance doit être dans le passé.");return}
  if(doi>=today){err("La date d'intégration doit être dans le passé.");return}
  if(dob>=doi){err("La date de naissance doit être antérieure à la date d'intégration.");return}
  const retAge=parseInt(document.getElementById('ret_age').value);
  const nom=document.getElementById('nom').value.trim()||"L'agent";
  const[ay,am,ad]=diffYMD(dob,today);
  const[ancy,ancm,ancd]=diffYMD(doi,today);
  const[ai_y,ai_m]=diffYMD(dob,doi);
  const dateRet=addYears(dob,retAge);
  const[arY]=diffYMD(doi,dateRet);
  document.getElementById('banner').textContent=`Résultats pour : ${nom}  —  calculés au ${fmtDate(today)}`;
  const COLORS=['#EF2B2D','#009A44','#1565C0','#F57F17'];
  const cards=[
    {lbl:"Âge actuel",val:`${ay} ans`,sub:`${am} mois  ${ad} j`,col:COLORS[0]},
    {lbl:"Ancienneté",val:`${ancy} ans`,sub:`${ancm} mois  ${ancd} j`,col:COLORS[1]},
    {lbl:"Âge à l'intégration",val:`${ai_y} ans`,sub:`${ai_m} mois`,col:COLORS[2]},
    {lbl:`Ancienneté retraite (${retAge} ans)`,val:`${arY} ans`,sub:"cumulés",col:COLORS[3]},
  ];
  document.getElementById('metrics').innerHTML=cards.map(c=>`<div class="metric-card"><div class="mc-label">${c.lbl}</div><div class="mc-val" style="color:${c.col}">${c.val}</div><div class="mc-sub">${c.sub}</div></div>`).join('');
  const INFOS={55:{lbl:"Retraite anticipée",col:"#1565C0"},58:{lbl:"Palier intermédiaire",col:"#2E7D32"},60:{lbl:"Retraite normale",col:"#F57F17"},63:{lbl:"Retraite différée",col:"#880E4F"}};
  document.getElementById('paliers').innerHTML=[55,58,60,63].map(age=>{
    const dp=addYears(dob,age);
    const[aY]=diffYMD(doi,dp);
    const statut=fmtRel(dp,today);
    const isPast=dp<=today;
    const{lbl,col}=INFOS[age];
    return`<div class="palier-row${isPast?' past':''}"><span>${age} ans</span><span style="color:${col}">${lbl}</span><span>${fmtDate(dp)}</span><span>${aY} ans</span><span><span class="badge" style="background:${isPast?'#E8F5E9':'#E3F2FD'};color:${isPast?'#2E7D32':'#1565C0'}">${statut}</span></span></div>`;
  }).join('');
  const isPast=dateRet<=today;
  const bg=isPast?'#2E7D32':'#1565C0';
  const rel=fmtRel(dateRet,today);
  document.getElementById('retraite').innerHTML=`<div class="ret-banner" style="background:${bg}"><h3>${isPast?'Retraite atteinte':'Retraite à venir'} — ${retAge} ans</h3><p style="color:${isPast?'#CCFFCC':'#CCEEFF'};font-size:12px">Date : ${fmtDate(dateRet)}</p><p style="color:#fff;font-size:12px;font-style:italic">${rel}  ·  ${arY} ans d'ancienneté cumulée</p></div>`;
  document.getElementById('results').style.display='block';
}
function effacer(){
  ['dob_j','dob_m','dob_a','doi_j','doi_m','doi_a'].forEach(id=>{document.getElementById(id).value=''});
  document.getElementById('nom').value='';
  document.getElementById('ret_age').value='60';
  document.getElementById('results').style.display='none';
  document.getElementById('err').style.display='none';
}
['dob_j','doi_j'].forEach(id=>{document.getElementById(id).addEventListener('input',function(){if(this.value.length===2)document.getElementById(id.replace('j','m')).focus()})});
['dob_m','doi_m'].forEach(id=>{document.getElementById(id).addEventListener('input',function(){if(this.value.length===2)document.getElementById(id.replace('m','a')).focus()})});
</script>
